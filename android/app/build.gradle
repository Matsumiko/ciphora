apply plugin: 'com.android.application'

def envOrProperty(String envName, String propertyName = null) {
    if (propertyName != null && project.hasProperty(propertyName)) {
        def value = project.property(propertyName)?.toString()
        if (value != null && !value.trim().isEmpty()) {
            return value.trim()
        }
    }

    def value = System.getenv(envName)
    if (value != null && !value.trim().isEmpty()) {
        return value.trim()
    }

    return null
}

def defaultVersionName = "1.3.0"
def resolvedVersionName = envOrProperty("CIPHORA_ANDROID_VERSION_NAME", "ciphoraAndroidVersionName") ?: defaultVersionName

def semverVersionCode(String versionName) {
    def matcher = versionName =~ /^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$/
    if (!matcher.matches()) {
        throw new GradleException("Android versionName must be semver-like to derive versionCode: ${versionName}")
    }

    def major = matcher[0][1].toInteger()
    def minor = matcher[0][2].toInteger()
    def patch = matcher[0][3].toInteger()
    return (major * 1000000) + (minor * 1000) + patch
}

def resolvedVersionCode = (envOrProperty("CIPHORA_ANDROID_VERSION_CODE", "ciphoraAndroidVersionCode") ?: semverVersionCode(resolvedVersionName).toString()).toInteger()
def releaseKeystoreFile = envOrProperty("CIPHORA_ANDROID_KEYSTORE_FILE", "ciphoraAndroidKeystoreFile")
def releaseKeystorePassword = envOrProperty("CIPHORA_ANDROID_KEYSTORE_PASSWORD", "ciphoraAndroidKeystorePassword")
def releaseKeyAlias = envOrProperty("CIPHORA_ANDROID_KEY_ALIAS", "ciphoraAndroidKeyAlias")
def releaseKeyPassword = envOrProperty("CIPHORA_ANDROID_KEY_PASSWORD", "ciphoraAndroidKeyPassword")
def releaseKeystoreType = envOrProperty("CIPHORA_ANDROID_KEYSTORE_TYPE", "ciphoraAndroidKeystoreType") ?: "pkcs12"
def hasReleaseSigning = releaseKeystoreFile != null && releaseKeystorePassword != null && releaseKeyAlias != null && releaseKeyPassword != null

android {
    namespace = "in.indevs.ciphora"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "in.indevs.ciphora"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseKeystoreFile)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
                storeType releaseKeystoreType
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

tasks.register("validateReleaseSigning") {
    doLast {
        if (!hasReleaseSigning) {
            throw new GradleException("Missing Android release signing config. Set CIPHORA_ANDROID_KEYSTORE_FILE, CIPHORA_ANDROID_KEYSTORE_PASSWORD, CIPHORA_ANDROID_KEY_ALIAS, and CIPHORA_ANDROID_KEY_PASSWORD.")
        }
    }
}

tasks.matching { task ->
    task.name in ["assembleRelease", "bundleRelease"]
}.configureEach {
    dependsOn("validateReleaseSigning")
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
